version: 2

# ============================================================================
# SOURCE: github_raw_source
# ============================================================================
# This source represents the raw GitHub events table created by our Week 1
# ingestion pipeline (src/ingestion/github_client.py).
#
# Data Flow:
#   GitHub API → Python Client → PostgreSQL (public.github_events_raw)
#
# Owner: Data Engineering Team
# Created: Week 1 (July 2026)
# Updated By: dbt (this file d``` ` ````ocuments it, doesn't create it)
# ============================================================================

sources:
  - name: github_raw_source
    description: >
      Raw GitHub event data ingested from the GitHub Events API.
      This source contains unprocessed JSONB payloads for events from three
      target repositories: facebook/react, microsoft/vscode, and vercel/next.js.
      
      Data is loaded via the Python ingestion client and stored exactly as
      received from the API with no transformations applied.
      
      This is the Bronze layer - the source of truth for all downstream transformations.

    database: pipeone_warehouse
    schema: public
    
    # Freshness checks: Alert if data hasn't been updated recently
    # (This feature will be configured in Week 3 when we add scheduling)
    # freshness:
    #   warn_after: {count: 6, period: hour}
    #   error_after: {count: 12, period: hour}
    
    # Load timestamp field for freshness monitoring
    loaded_at_field: fetched_at

    tables:
      - name: github_events_raw
        description: >
          Raw GitHub events table containing JSONB payloads from the GitHub Events API.
          Each row represents a single event (PushEvent, PullRequestEvent, IssueEvent, etc.)
          captured from one of our monitored repositories.
          
          Schema:
            - event_id: Unique identifier from GitHub (PRIMARY KEY)
            - repo_name: Repository name (e.g., 'facebook/react')
            - event_type: Event type extracted at ingestion (e.g., 'PushEvent')
            - fetched_at: Timestamp when our ingestion client retrieved this event
            - raw_payload: Complete JSONB payload from GitHub API (all nested fields preserved)
          
          Idempotency: Guaranteed by PRIMARY KEY on event_id with ON CONFLICT DO NOTHING.
          Retention: No automatic deletion - historical events are preserved.
          Update Frequency: Every pipeline run (currently manual, will be scheduled in Week 3).

        columns:
          - name: event_id
            description: >
              Unique event identifier from GitHub. Used as PRIMARY KEY to prevent duplicates.
              Example: '12345678901234567890'
            tests:
              - not_null
              - unique

          - name: repo_name
            description: >
              Full repository name in 'owner/repo' format.
              Examples: 'facebook/react', 'microsoft/vscode', 'vercel/next.js'
            tests:
              - not_null

          - name: event_type
            description: >
              GitHub event type extracted at ingestion time for filtering convenience.
              Common values: 'PushEvent', 'PullRequestEvent', 'IssuesEvent', 'WatchEvent', 'ForkEvent'
              
              Note: This is redundant with raw_payload->>'type' but kept for query performance.
            tests:
              - not_null

          - name: fetched_at
            description: >
              Timestamp (UTC) when our ingestion pipeline retrieved this event from GitHub.
              Used for freshness monitoring and data quality checks.
              
              Note: This is NOT the event creation time (that's in raw_payload->>'created_at').
            tests:
              - not_null

          - name: raw_payload
            description: >
              Complete JSONB object from GitHub Events API with all nested fields preserved.
              
              Structure varies by event_type, but common top-level keys:
                - id: Event ID (matches event_id column)
                - type: Event type (matches event_type column)
                - actor: User who triggered the event (id, login, avatar_url)
                - repo: Repository information (id, name, url)
                - payload: Event-specific data (structure varies)
                - public: Boolean indicating if event is public
                - created_at: ISO 8601 timestamp from GitHub
              
              Storage: JSONB (binary format, indexable, queryable with -> and ->> operators)
              
              Downstream Usage:
                - Silver models parse specific fields from this payload
                - Gold models aggregate metrics derived from parsed fields
            tests:
              - not_null

  # ============================================================================
  # SOURCE: hn_raw_source
  # ============================================================================
  # This source represents the raw Hacker News stories table created by the
  # HN ingestion pipeline (src/ingestion/hn_client.py).
  #
  # Data Flow:
  #   Hacker News Firebase API → Python Client → PostgreSQL (public.hn_stories_raw)
  #
  # Owner: Data Engineering Team
  # Created: Multi-Source Evolution (July 2026)
  # ============================================================================

  - name: hn_raw_source
    description: >
      Raw Hacker News story data ingested from the official HN Firebase API.
      This source contains top stories with complete metadata and raw JSON payloads.

      Data is loaded via the Python HN ingestion client and stored with
      individual typed columns plus the complete raw payload for downstream
      transformations.

      This is the Bronze layer input for the Hacker News connector.

    database: pipeone_warehouse
    schema: public

    loaded_at_field: fetched_at

    tables:
      - name: hn_stories_raw
        description: >
          Raw Hacker News stories table containing story metadata and JSONB payloads
          from the HN Firebase API. Each row represents a single top story
          fetched during an ingestion run.

          Schema:
            - story_id: Unique HN item identifier (PRIMARY KEY)
            - title: Story headline text
            - author: HN username of the story submitter
            - url: External URL the story links to (NULL for Ask HN / Show HN)
            - score: Current upvote count (mutable — updated on re-ingestion)
            - time: Unix timestamp when the story was submitted
            - descendants: Number of comments (mutable — updated on re-ingestion)
            - type: HN item type (usually 'story')
            - raw_json: Complete JSONB payload from HN API
            - fetched_at: Timestamp when our pipeline retrieved this story

          Idempotency: Guaranteed by PRIMARY KEY on story_id with ON CONFLICT DO UPDATE.
          Unlike GitHub events (immutable), HN stories are mutable — scores and
          comment counts change over time. The upsert refreshes these fields.

        columns:
          - name: story_id
            description: >
              Unique Hacker News item identifier. Used as PRIMARY KEY.
              Example: 41234567
            tests:
              - not_null
              - unique

          - name: title
            description: >
              Story headline text as submitted by the author.
              May contain special characters and unicode.
            tests:
              - not_null

          - name: author
            description: >
              Hacker News username of the person who submitted the story.
              Example: 'pg', 'dang'

          - name: url
            description: >
              External URL the story links to. NULL for text-only posts
              (Ask HN, Show HN, polls).

          - name: score
            description: >
              Current upvote count for the story. Mutable — refreshed
              on each ingestion run via ON CONFLICT DO UPDATE.

          - name: time
            description: >
              Unix timestamp (seconds since epoch) when the story was
              originally submitted to Hacker News.
            tests:
              - not_null

          - name: descendants
            description: >
              Total number of comments on the story. Mutable — refreshed
              on each ingestion run.

          - name: type
            description: >
              HN item type. Usually 'story' for top stories.
              Other possible values: 'job', 'poll'.

          - name: raw_json
            description: >
              Complete JSONB object from the HN Firebase API.
              Preserves all fields including 'kids' (comment IDs),
              'parts' (poll options), and any future API additions.
            tests:
              - not_null

          - name: fetched_at
            description: >
              Timestamp (UTC) when our ingestion pipeline retrieved this story.
              Used for freshness monitoring and pipeline health checks.
            tests:
              - not_null

